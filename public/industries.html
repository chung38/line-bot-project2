<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行業主檔</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">LINE BOT 管理台</div>
    <nav class="nav">
  <a class="nav-link" href="/index.html">Dashboard</a>
  <a class="nav-link" href="/groups.html">群組設定</a>
  <a class="nav-link active" href="/industries.html">行業主檔</a>
  <a class="nav-link" href="/subscriptions.html">授權管理</a>
  <a class="nav-link" href="/logs.html">操作紀錄</a>
</nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>行業主檔</h1>
          <p>可新增、修改與停用行業別項目</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2 id="industryFormTitle">新增行業</h2>
          <button id="industryResetBtn" type="button" class="btn-secondary">清空表單</button>
        </div>

        <form id="industryForm" class="form-grid">
          <input id="industryId" type="hidden" />

          <div class="form-group">
            <label for="industryName">行業名稱</label>
            <input id="industryName" type="text" placeholder="請輸入行業名稱" required />
          </div>

          <div class="form-group">
            <label for="sortOrder">排序</label>
            <input id="sortOrder" type="number" value="9999" />
          </div>

          <div class="form-group full">
            <label class="checkbox-item">
              <input id="industryEnabled" type="checkbox" checked />
              <span>啟用此行業</span>
            </label>
          </div>

          <div class="form-group full">
            <div class="inline-actions">
              <button type="submit">儲存行業</button>
            </div>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>行業列表</h2>
          <input
            id="industryKeyword"
            class="search-input"
            type="text"
            placeholder="搜尋 行業名稱 / ID"
          />
        </div>

        <div id="industryList" class="list-grid"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/common.js"></script>
  <script src="/js/industries.js"></script>
</body>
</html>
