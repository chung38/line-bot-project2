<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>群組設定</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">LINE BOT 管理台</div>
      <nav class="nav">
        <a class="nav-link" href="/index.html">Dashboard</a>
        <a class="nav-link active" href="/groups.html">群組設定</a>
        <a class="nav-link" href="/industries.html">行業主檔</a>
        <a class="nav-link" href="/logs.html">操作紀錄</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>群組設定</h1>
          <p>可直接查看群組名稱、群組人數、授權者、語言與行業別，並修改群組設定</p>
        </div>
        <div class="auth-box">
          <input id="authUser" type="text" placeholder="帳號" />
          <input id="authPass" type="password" placeholder="密碼" />
          <button id="saveAuthBtn">儲存登入</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>編輯群組</h2>
          <button id="resetBtn" class="btn-secondary">清空表單</button>
        </div>

        <form id="groupForm" class="form-grid">
          <div class="form-group">
            <label for="gid">群組 ID</label>
            <input id="gid" type="text" placeholder="例如 Cxxxxxxxxxx" required />
          </div>

          <div class="form-group">
            <label for="inviter">授權 userId</label>
            <input id="inviter" type="text" placeholder="例如 Uxxxxxxxxxx" />
          </div>

          <div class="form-group full">
            <label>翻譯語言</label>
            <div id="langCheckboxes" class="checkbox-grid"></div>
          </div>

          <div class="form-group">
            <label for="industry">行業別</label>
            <select id="industry"></select>
          </div>

          <div class="form-group">
            <label>操作</label>
            <div class="inline-actions">
              <button type="submit">儲存設定</button>
              <button type="button" id="deleteBtn" class="btn-danger">刪除整組設定</button>
              <button type="button" id="sendMenuBtn" class="btn-secondary">推送設定選單</button>
            </div>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>群組列表</h2>
          <input
            id="keywordInput"
            class="search-input"
            type="text"
            placeholder="搜尋 群組名稱 / gid / 授權者 / 行業別 / 人數"
          />
        </div>
        <div id="groupList" class="list-grid"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/common.js"></script>
  <script src="/js/groups.js"></script>
</body>
</html>
