<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>群組設定 — LINE BOT 管理台</title><link rel="stylesheet" href="/css/style.css"/></head>
<body><div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-icon">🤖</div><div class="brand-text">LINE BOT<br><small>管理台</small></div></div><nav class="nav"><div class="nav-section">選單</div><a class="nav-link" href="/index.html"><span class="ni">📊</span>Dashboard</a>
<a class="nav-link  active" href="/groups.html"><span class="ni">👥</span>群組設定</a>
<a class="nav-link" href="/industries.html"><span class="ni">🏭</span>行業主檔</a>
<a class="nav-link" href="/subscriptions.html"><span class="ni">🔑</span>授權管理</a>
<a class="nav-link" href="/logs.html"><span class="ni">📋</span>操作紀錄</a>
</nav></aside><div class="main">
<header class="topbar"><div><div class="topbar-title">群組設定</div><div class="topbar-sub">管理所有 LINE 群組</div></div></header>
<div class="page"><div class="page-header"><h1>👥 群組設定</h1><p>查看群組名稱、人數、授權者、語言與行業別</p></div>
<div class="panel"><div class="panel-header"><h2><span class="ph-icon">✏️</span>編輯群組</h2><button id="resetBtn" class="btn btn-ghost btn-sm">✕ 清空</button></div>
<form id="groupForm" class="form-grid">
<div class="form-group"><label>群組 ID *</label><input id="gid" type="text" class="field" placeholder="Cxxxxxxxxxx" required/></div>
<div class="form-group"><label>授權者 userId</label><input id="inviter" type="text" class="field" placeholder="Uxxxxxxxxxx"/></div>
<div class="form-group full"><label>翻譯語言</label><div id="langCheckboxes" class="checkbox-grid"></div></div>
<div class="form-group"><label>行業別</label><select id="industry" class="field"></select></div>
<div class="form-group full"><div class="btn-row">
<button type="submit" class="btn btn-primary">💾 儲存設定</button>
<button type="button" id="sendMenuBtn" class="btn btn-secondary">📤 推送選單</button>
<button type="button" id="deleteBtn" class="btn btn-danger">🗑 刪除設定</button>
</div></div></form></div>
<div class="panel"><div class="panel-header"><h2><span class="ph-icon">📋</span>群組列表</h2><button class="btn btn-ghost btn-sm" onclick="loadGroups()">🔄 重新整理</button></div>
<div class="filter-bar"><div class="search-wrap"><span class="search-icon">🔍</span><input id="keywordInput" type="text" class="field search-field" placeholder="搜尋群組名稱 / ID / 授權者 / 行業"/></div><span id="filterCount" class="filter-count">— 筆</span></div>
<div class="batch-bar"><span class="batch-count" id="selectedSummary">已選取 0 筆</span><button id="selectAllBtn" class="btn btn-ghost btn-sm">全選</button><button id="clearSelectedBtn" class="btn btn-ghost btn-sm">清除</button><button id="batchDeleteBtn" class="btn btn-danger btn-sm">🗑 批次刪除</button></div>
<div id="groupList" class="card-grid"></div></div></div></div></div>
<div id="toast" class="toast"></div>
<script src="/js/common.js"></script><script src="/js/groups.js"></script></body></html>
