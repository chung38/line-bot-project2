<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作紀錄</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">LINE BOT 管理台</div>
<nav class="nav">
  <a class="nav-link" href="/index.html">Dashboard</a>
  <a class="nav-link" href="/groups.html">群組設定</a>
  <a class="nav-link" href="/industries.html">行業主檔</a>
  <a class="nav-link" href="/subscriptions.html">授權管理</a>
  <a class="nav-link active" href="/logs.html">操作紀錄</a>
</nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>操作紀錄</h1>
          <p>檢視管理者對群組與行業資料的操作紀錄</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>查詢條件</h2>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="logKeyword">關鍵字</label>
            <input id="logKeyword" type="text" placeholder="搜尋 動作 / 內容 / 操作者" />
          </div>

          <div class="form-group">
            <label for="logAction">動作代碼</label>
            <input id="logAction" type="text" placeholder="例如 CREATE_INDUSTRY" />
          </div>

          <div class="form-group full">
            <div class="inline-actions">
              <button id="logSearchBtn" type="button">查詢</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>操作紀錄列表</h2>
        </div>

        <div id="logList"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/common.js"></script>
  <script src="/js/logs.js"></script>
</body>
</html>
