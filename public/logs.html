<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作紀錄</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">LINE BOT 管理台</div>
      <nav class="nav">
        <a class="nav-link" href="/index.html">Dashboard</a>
        <a class="nav-link" href="/groups.html">群組設定</a>

      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>操作紀錄</h1>
          <p>檢視管理者對群組與行業資料的操作紀錄</p>
        </div>

        <div class="auth-box auth-box-hidden" aria-hidden="true">
          <input id="authUser" type="text" placeholder="帳號" tabindex="-1" />
          <input id="authPass" type="password" placeholder="密碼" tabindex="-1" />
          <button id="saveAuthBtn" type="button" tabindex="-1">儲存登入</button>
        </div>
      </header>

      <section class="panel">
        <div id="logsApp"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/common.js"></script>
  <script src="/js/logs.js"></script>
</body>
</html>
